version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: tripistry_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mydb
    volumes:
      - db_data:/var/lib/mysql
      - ./mydb.sql:/docker-entrypoint-initdb.d/mydb.sql  # your DB dump
    ports:
      - "3306:3306"

  php:
    image: php:8.2-apache
    container_name: tripistry_app
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
    command: >
      bash -c "
        docker-php-ext-install pdo pdo_mysql &&
        apache2-foreground
      "

volumes:
  db_data:
